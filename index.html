<div id="essay-${index}" class="translation-area">
<strong>Answer:</strong><br>${q.answer}<br><br>
<strong>الترجمة:</strong><br>${q.arAnswer || ''}
</div>
`;
} else {
card.innerHTML = `
<button class="translate-btn" onclick="toggleTranslation(${index})">Translate / ترجمة</button>
<div id="trans-${index}" class="translation-area"><strong>السؤال:</strong> ${q.arQ || ''}</div>
<div class="q-text">${index + 1}. ${q.q}</div>
<div id="options-${index}">
${q.options.map((opt, optIdx) => `
<button class="option" onclick="checkAnswer(${index}, ${optIdx}, this, ${opt.correct})">
<span>${opt.text}</span>
<span class="ar-opt">${opt.ar || 'تمت إضافة الترجمة'}</span>
</button>
`).join('')}
</div>
<div id="result-${index}" class="result-msg"></div>
`;
container.appendChild(card);
});
}

window.checkAnswer = function(qIdx, optIdx, btn, isCorrect) {
const parent = document.getElementById(`options-${qIdx}`);
if (parent.dataset.answered === "true") return;
parent.dataset.answered = "true";

const allOptions = parent.querySelectorAll('.option');
const resultMsg = document.getElementById(`result-${qIdx}`);
const correctOpt = questions[qIdx].options.find(o => o.correct);

allOptions.forEach(opt => {
opt.querySelector('.ar-opt').style.display = 'block';
});

if (isCorrect) {
score++;
btn.classList.add('correct');
resultMsg.innerHTML = `✅ Correct Answer / إجابة صحيحة`;
if(correctOpt.ar){
resultMsg.innerHTML += `<br>الترجمة: ${correctOpt.ar}`;
}
if(correctOpt.ar){
resultMsg.innerHTML += `<br><strong>${correctOpt.ar}</strong>`;
}
} else {
btn.classList.add('wrong');
allOptions.forEach(opt => {
if (opt.innerHTML.includes(correctOpt.text)) opt.classList.add('correct');
});
resultMsg.innerHTML = `❌ Wrong Answer / إجابة خاطئة<br>Correct Answer: ${correctOpt.text}<br>الترجمة: ${correctOpt.ar || 'تمت إضافة الترجمة'}`;
}

document.getElementById('scoreBox').innerText = `Score: ${score} / ${questions.length}`;
};

window.toggleEssayAnswer = function(index) {
const area = document.getElementById(`essay-${index}`);
if (area.style.display === 'block') {
area.style.display = 'none';
} else {
area.style.display = 'block';
}
};

window.toggleTranslation = function(index) {
const area = document.getElementById(`trans-${index}`);
const optionsAr = document.querySelectorAll(`#options-${index} .ar-opt`);

if (area.style.display === 'block') {
area.style.display = 'none';
optionsAr.forEach(o => o.style.display = 'none');
} else {
area.style.display = 'block';
optionsAr.forEach(o => o.style.display = 'block');
}
};

const optionTranslations = {
"A. A complete copy of a real system":"أ. نسخة كاملة من نظام حقيقي",
"B. A simplified representation of a real system":"ب. تمثيل مبسط لنظام حقيقي",
"C. A random experiment":"ج. تجربة عشوائية",
"D. A physical machine":"د. آلة فيزيائية",
"A. Destroy systems":"أ. تدمير الأنظمة",
"B. Increase system complexity":"ب. زيادة تعقيد النظام",
"C. Understand and analyze systems":"ج. فهم وتحليل الأنظمة",
"D. Eliminate data":"د. حذف البيانات",
"True":"صح",
"False":"خطأ"
};

questions.forEach(q => {
if(q.options){
q.options.forEach(opt => {
if(!opt.ar && optionTranslations[opt.text]){
opt.ar = optionTranslations[opt.text];
}
});
}

if(!q.arQ && autoTranslations[q.q]){
q.arQ = autoTranslations[q.q];
}
});

renderQuiz();
</script></body>
</html>
